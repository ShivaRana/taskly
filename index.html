<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .wrapper {
            background: linear-gradient(rgba(119, 13, 13, 0.61), rgba(99, 17, 99, 0.829));
            min-height: 100vh;
        }
        .table {
            --bs-table-bg: transparent;
        }
    </style>
    <title>Taskly</title>
</head>

<body>
    <div class="wrapper pt-5">
        <!-- title  -->
        <div class="container">
            <h1 class="text-center">Not To Do List</h1>

            <!-- form  -->
            <form onsubmit="handleOnSubmit(this)" action="javascript:void(0)" class="border p-5 rounded shadow-lg mt-5">
                <div class="row g-2">
                    <div class="col-md-7">
                        <input type="text" class="form-control" placeholder="Task" aria-label="First name" name="task">
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" placeholder="40" aria-label="Last name" name="hr"
                            min="1">
                    </div>
                    <div class="col-md-3 d-grid">
                        <button class="btn btn-primary">Add New Task</button>
                    </div>
                </div>
            </form>

            <!-- tables  -->
            <div class="row mt-5">
                <div class="col-md">
                    <h3 class="text-center">Entry List</h3>
                    <hr />

                    <!-- Entry list table  -->
                    <table class="table table-striped table-hover border">
                        <tbody id="entryList"></tbody>
                    </table>
                </div>
                
                <div class="col-md">
                    <h3 class="text-center">Bad List</h3>
                    <hr />

                    <!-- Bad list table  -->
                    <table class="table table-striped table-hover border">
                        <tbody id="badList">
                        </tbody>
                    </table>

                    <div class="alert alert-success">
                        You could save upto <span id="savedHrs">0</span>hrs.
                    </div>
                </div>
            </div>

            <div class="alert alert-success">
                Total allocated time = <span id="totalHrs">0</span>hrs
            </div>
            
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
